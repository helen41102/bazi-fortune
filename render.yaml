services:
  - type: web
    name: bazi-fortune
    runtime: python
    buildCommand: pip install -r backend/requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false        # 在 Render 控制台手动填写，不写入代码
      - key: ALLOWED_ORIGINS
        value: "*"
